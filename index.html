<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Jewel</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: system-ui; }

.stat-card {
  transition: 0.3s;
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
}
.stat-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 30px rgba(0,0,0,0.08);
}
</style>
</head>

<body class="bg-gradient-to-br from-gray-100 to-gray-200">

<!-- LOGIN -->
<div id="login-screen" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-purple-700 to-indigo-600">
  <div class="bg-white p-8 rounded-3xl shadow-xl w-80">
    <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">Perfect Jewel</h1>

    <input id="username" placeholder="Username" class="w-full mb-3 p-3 border rounded-xl">
    <input id="password" type="password" placeholder="Password" class="w-full mb-4 p-3 border rounded-xl">

    <button onclick="login()" class="w-full bg-indigo-600 text-white p-3 rounded-xl">Login</button>
  </div>
</div>

<!-- APP -->
<div id="main-app" class="hidden h-screen flex">

<!-- SIDEBAR -->
<div class="w-60 bg-white border-r p-4 hidden md:block">
  <h2 class="text-xl font-bold text-indigo-600 mb-6">Perfect Jewel</h2>

  <button onclick="showPage('dashboard')" class="block w-full text-left mb-2 p-2 rounded hover:bg-gray-100">Dashboard</button>
  <button onclick="showPage('products')" class="block w-full text-left mb-2 p-2 rounded hover:bg-gray-100">Products</button>
  <button onclick="showPage('cash')" class="block w-full text-left p-2 rounded hover:bg-gray-100">Cash</button>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<!-- TOP -->
<div class="bg-white p-4 flex justify-between items-center border-b">
  <h2 id="page-title" class="font-semibold">Dashboard</h2>

  <div class="flex gap-2">
    <span id="cash-top" class="font-bold text-emerald-600"></span>

    <button onclick="showInvested()" class="bg-purple-600 text-white px-3 py-1 rounded">Invested</button>
    <button onclick="adjustCash()" class="bg-indigo-600 text-white px-3 py-1 rounded">+ Cash</button>
  </div>
</div>

<!-- CONTENT -->
<div class="p-6 overflow-auto">

<!-- DASHBOARD -->
<div id="dashboard-page">

<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">

<div class="stat-card p-4 rounded-xl">
<p class="text-gray-500">Cash</p>
<p id="cash-balance" class="font-bold text-xl text-emerald-600"></p>
</div>

<div class="stat-card p-4 rounded-xl">
<p class="text-gray-500">Products</p>
<p id="total-products" class="font-bold text-xl"></p>
</div>

<div class="stat-card p-4 rounded-xl">
<p class="text-gray-500">Inventory</p>
<p id="inventory-value" class="font-bold text-xl"></p>
</div>

<div class="stat-card p-4 rounded-xl">
<p class="text-gray-500">Profit</p>
<p id="profit-potential" class="font-bold text-xl text-emerald-600"></p>
</div>

</div>

<div class="bg-white p-4 rounded-xl">
<canvas id="roiChart"></canvas>
</div>

</div>

<!-- PRODUCTS -->
<div id="products-page" class="hidden">

<div class="flex gap-2 mb-4">
<input id="search" onkeyup="filterProducts()" placeholder="Search..." class="flex-1 p-2 border rounded">
<button onclick="openModal()" class="bg-indigo-600 text-white px-3 rounded">Add</button>
</div>

<table class="w-full bg-white rounded overflow-hidden">
<thead class="bg-gray-100">
<tr>
<th class="p-2 text-left">Name</th>
<th>Cost</th>
<th>Sell</th>
<th>Stock</th>
<th>ROI</th>
<th></th>
</tr>
</thead>
<tbody id="products-table"></tbody>
</table>

</div>

<!-- CASH -->
<div id="cash-page" class="hidden">
<div id="cash-log"></div>
</div>

</div>
</div>
</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
<div class="bg-white p-6 rounded-xl w-80">

<form id="form">
<input id="name" placeholder="Name" required class="w-full mb-2 p-2 border rounded">
<input id="cost" type="number" placeholder="Cost" required class="w-full mb-2 p-2 border rounded">
<input id="sell" type="number" placeholder="Sell" required class="w-full mb-2 p-2 border rounded">
<input id="stock" type="number" placeholder="Stock" class="w-full mb-3 p-2 border rounded">

<button class="w-full bg-indigo-600 text-white p-2 rounded">Save</button>
</form>

</div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];
let cash = parseFloat(localStorage.getItem('cash')) || 0;

function login(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;

  if(u==="feluna" && p==="1234"){
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    render();
  } else alert("Wrong login");
}

function render(){
  document.getElementById('cash-balance').textContent = "$"+cash.toFixed(2);
  document.getElementById('cash-top').textContent = "$"+cash.toFixed(2);
  document.getElementById('total-products').textContent = products.length;

  let total=0, profit=0;
  products.forEach(p=>{
    total+=p.cost*p.stock;
    profit+=(p.sell-p.cost)*p.stock;
  });

  document.getElementById('inventory-value').textContent="$"+total.toFixed(2);
  document.getElementById('profit-potential').textContent="$"+profit.toFixed(2);

  renderProducts();
  drawChart();
}

function drawChart(){
  new Chart(document.getElementById('roiChart'),{
    type:'pie',
    data:{
      labels:products.map(p=>p.name),
      datasets:[{
        data:products.map(p=>((p.sell-p.cost)/p.cost*100)||0),
        backgroundColor:['#6366f1','#a855f7','#f43f5e','#10b981','#f59e0b']
      }]
    }
  });
}

function showPage(p){
  document.querySelectorAll('[id$="-page"]').forEach(x=>x.classList.add('hidden'));
  document.getElementById(p+'-page').classList.remove('hidden');
}

function renderProducts(list=products){
  const tbody=document.getElementById('products-table');
  tbody.innerHTML=list.map(p=>`
  <tr>
    <td class="p-2">${p.name}</td>
    <td>$${p.cost}</td>
    <td>$${p.sell}</td>
    <td>${p.stock}</td>
    <td>${((p.sell-p.cost)/p.cost*100).toFixed(1)}%</td>
    <td><button onclick="del('${p.id}')">❌</button></td>
  </tr>
  `).join('');
}

function del(id){
  products=products.filter(p=>p.id!=id);
  save();
}

function filterProducts(){
  let t=document.getElementById('search').value.toLowerCase();
  renderProducts(products.filter(p=>p.name.toLowerCase().includes(t)));
}

function openModal(){
  document.getElementById('modal').classList.remove('hidden');
}

document.getElementById('form').onsubmit=e=>{
  e.preventDefault();
  products.push({
    id:Date.now(),
    name:document.getElementById('name').value,
    cost:+document.getElementById('cost').value,
    sell:+document.getElementById('sell').value,
    stock:+document.getElementById('stock').value||0
  });
  document.getElementById('modal').classList.add('hidden');
  save();
};

function save(){
  localStorage.setItem('products',JSON.stringify(products));
  localStorage.setItem('cash',cash);
  render();
}

function adjustCash(){
  let a=parseFloat(prompt("Amount (+/-):"));
  if(!isNaN(a)){ cash+=a; save(); }
}

function showInvested(){
  let total=products.reduce((s,p)=>s+p.cost*p.stock,0);
  alert("Invested: $"+total.toFixed(2));
}

</body>
</html>
