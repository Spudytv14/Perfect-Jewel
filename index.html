<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect Jewel - Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }

    .stat-card {
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .stat-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 25px 40px rgba(0,0,0,0.08);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>

<body class="h-full bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-800 dark:to-gray-900 dark:text-white transition-colors duration-300">

<!-- Login -->
<div id="login-screen" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-purple-700 to-indigo-600">
  <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-8 w-full max-w-md animate-fade-in">
    <h1 class="text-4xl font-bold text-indigo-600 dark:text-indigo-400 text-center mb-6">Perfect Jewel</h1>

    <input id="username" placeholder="Username" class="w-full mb-4 px-5 py-3 border dark:border-gray-700 dark:bg-gray-900 rounded-2xl">
    <input id="password" type="password" placeholder="Password" class="w-full mb-4 px-5 py-3 border dark:border-gray-700 dark:bg-gray-900 rounded-2xl">

    <button onclick="login()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl transition">Login</button>
  </div>
</div>

<!-- App -->
<div id="main-app" class="hidden flex h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-white dark:bg-gray-800 border-r dark:border-gray-700 hidden md:flex flex-col transition-colors duration-300">
    <div class="p-6 border-b dark:border-gray-700 text-2xl font-bold text-indigo-600 dark:text-indigo-400">Perfect Jewel</div>

    <div class="p-4 space-y-2">
      <button onclick="showPage('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition">Dashboard</button>
      <button onclick="showPage('products')" class="w-full text-left p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition">Products</button>
      <button onclick="showPage('cash')" class="w-full text-left p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition">Cash</button>
    </div>
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col">

    <!-- Top -->
    <div class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-6 py-4 flex justify-between items-center transition-colors duration-300 relative">
      <h2 id="page-title" class="text-xl font-semibold">Dashboard</h2>

      <div class="flex items-center gap-3">
        <div id="cash-top" class="font-bold text-emerald-600 dark:text-emerald-400"></div>

        <button onclick="showInvestedAmount()" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-4 py-2 rounded-xl hover:opacity-90 transition">
          Invested
        </button>

        <button onclick="adjustCash()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl transition">
          + Cash
        </button>

        <!-- Settings Dropdown -->
        <div class="relative ml-2">
          <button onclick="toggleSettings()" class="text-gray-500 hover:text-indigo-600 dark:text-gray-400 dark:hover:text-indigo-400 text-xl transition p-2">
            <i class="fa-solid fa-gear"></i>
          </button>

          <div id="settings-menu" class="hidden absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-xl shadow-lg border dark:border-gray-700 overflow-hidden z-50 animate-fade-in">
            <button onclick="toggleDarkMode()" class="w-full text-left px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-2 transition">
              <i class="fa-solid fa-moon w-5"></i> Toggle Mode
            </button>
            <button class="w-full text-left px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center gap-2 transition">
              <i class="fa-solid fa-ellipsis w-5"></i> More
            </button>
            <div class="border-t dark:border-gray-700"></div>
            <button onclick="logout()" class="w-full text-left px-4 py-3 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center gap-2 transition">
              <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Pages -->
    <div class="p-6 overflow-auto">

      <!-- Dashboard -->
      <div id="dashboard-page" class="animate-fade-in">
        <!-- Greeting -->
        <div class="mb-6 p-6 rounded-2xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-lg animate-fade-in">
          <h3 class="text-2xl font-bold" id="welcome-message">Welcome!</h3>
          <p class="text-indigo-100 mt-1">Here is the latest update on your Perfect Jewel inventory.</p>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">

          <div class="stat-card p-5 rounded-2xl">
            <p class="text-gray-500">Cash</p>
            <p id="cash-balance" class="text-2xl font-bold text-emerald-600"></p>
          </div>

          <div class="stat-card p-5 rounded-2xl">
            <p class="text-gray-500">Products</p>
            <p id="total-products" class="text-2xl font-bold"></p>
          </div>

          <div class="stat-card p-5 rounded-2xl">
            <p class="text-gray-500">Inventory</p>
            <p id="inventory-value" class="text-2xl font-bold"></p>
          </div>

          <div class="stat-card p-5 rounded-2xl">
            <p class="text-gray-500">Profit</p>
            <p id="profit-potential" class="text-2xl font-bold text-emerald-600"></p>
          </div>

        </div>

      </div>

      <!-- Products -->
      <div id="products-page" class="hidden animate-fade-in">

        <div class="flex gap-3 mb-4">
          <input id="search" placeholder="Search..." onkeyup="filterProducts()" class="flex-1 px-4 py-2 border rounded-xl">
          <button onclick="showAddProductModal()" class="bg-indigo-600 text-white px-4 rounded-xl">Add</button>
        </div>

        <table class="w-full bg-white dark:bg-gray-800 rounded-xl overflow-hidden">
          <thead class="bg-gray-100 dark:bg-gray-700">
            <tr>
              <th class="p-3 text-left">Name</th>
              <th class="p-3">Cost</th>
              <th class="p-3">Sell</th>
              <th class="p-3">Stock</th>
              <th class="p-3">ROI</th>
              <th class="p-3">Action</th>
            </tr>
          </thead>
          <tbody id="products-table"></tbody>
        </table>
      </div>

      <!-- Cash -->
      <div id="cash-page" class="hidden animate-fade-in">
        <div id="cash-log" class="space-y-3"></div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div id="product-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl w-80 animate-fade-in">

    <form id="product-form" class="space-y-3">
      <input id="name" placeholder="Name" required class="w-full p-2 border dark:border-gray-700 dark:bg-gray-900 rounded">
      <input id="cost" type="number" placeholder="Cost" required class="w-full p-2 border dark:border-gray-700 dark:bg-gray-900 rounded">
      <input id="selling" type="number" placeholder="Selling" required class="w-full p-2 border dark:border-gray-700 dark:bg-gray-900 rounded">
      <input id="stock" type="number" placeholder="Stock" class="w-full p-2 border dark:border-gray-700 dark:bg-gray-900 rounded">

      <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded transition">Save</button>
    </form>

  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];
let cashBalance = parseFloat(localStorage.getItem('cashBalance')) || 0;
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
let currentUser = "";

function login() {
  const usernameVal = document.getElementById('username').value;
  const passwordVal = document.getElementById('password').value;
  if (usernameVal && passwordVal === "1234") {
    currentUser = usernameVal;
    document.getElementById('welcome-message').textContent = `Welcome, ${currentUser}!`;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    renderDashboard();
  }
}

function toggleSettings() {
  const menu = document.getElementById('settings-menu');
  menu.classList.toggle('hidden');
}

function toggleDarkMode() {
  document.documentElement.classList.toggle('dark');
  toggleSettings(); // Close menu after toggle
}

function logout() {
  currentUser = "";
  document.getElementById('username').value = "";
  document.getElementById('password').value = "";
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  toggleSettings(); // Close menu
}

// Close settings menu when clicking outside
document.addEventListener('click', function(event) {
  const menu = document.getElementById('settings-menu');
  const gearButton = document.querySelector('button[onclick="toggleSettings()"]');
  if (!menu.classList.contains('hidden') && !menu.contains(event.target) && !gearButton.contains(event.target)) {
    menu.classList.add('hidden');
  }
});

function showInvestedAmount() {
  const invested = products.reduce((sum, p) => sum + (p.cost * p.stock), 0);
  alert("Total Invested: $" + invested.toFixed(2));
}

function renderDashboard() {
  document.getElementById('cash-balance').textContent = "$" + cashBalance.toFixed(2);
  document.getElementById('cash-top').textContent = "$" + cashBalance.toFixed(2);
  document.getElementById('total-products').textContent = products.length;

  let total = products.reduce((s,p)=>s+p.cost*p.stock,0);
  let profit = products.reduce((s,p)=>s+(p.selling-p.cost)*p.stock,0);

  document.getElementById('inventory-value').textContent = "$"+total.toFixed(2);
  document.getElementById('profit-potential').textContent = "$"+profit.toFixed(2);

  renderProducts();
}

function showPage(p){
  document.querySelectorAll('[id$="-page"]').forEach(x=>x.classList.add('hidden'));
  document.getElementById(p+'-page').classList.remove('hidden');
}

function renderProducts(list=products){
  document.getElementById('products-table').innerHTML = list.map(p=>`
    <tr>
      <td class="p-2">${p.name}</td>
      <td class="p-2">$${p.cost}</td>
      <td class="p-2">$${p.selling}</td>
      <td class="p-2">${p.stock}</td>
      <td class="p-2">${((p.selling-p.cost)/p.cost*100).toFixed(1)}%</td>
      <td class="p-2"><button onclick="deleteProduct('${p.id}')">❌</button></td>
    </tr>
  `).join('');
}

function deleteProduct(id){
  products = products.filter(p=>p.id!==id);
  localStorage.setItem('products',JSON.stringify(products));
  renderDashboard();
}

function filterProducts(){
  let t = document.getElementById('search').value.toLowerCase();
  renderProducts(products.filter(p=>p.name.toLowerCase().includes(t)));
}

function showAddProductModal(){
  document.getElementById('product-modal').classList.remove('hidden');
}

document.getElementById('product-form').onsubmit = e=>{
  e.preventDefault();
  products.push({
    id:Date.now(),
    name:document.getElementById('name').value,
    cost:+document.getElementById('cost').value,
    selling:+document.getElementById('selling').value,
    stock:+document.getElementById('stock').value
  });
  localStorage.setItem('products',JSON.stringify(products));
  document.getElementById('product-modal').classList.add('hidden');
  renderDashboard();
}

function adjustCash(){
  let a = parseFloat(prompt("Amount:"));
  if(!isNaN(a)){
    cashBalance+=a;
    localStorage.setItem('cashBalance',cashBalance);
    renderDashboard();
  }
}
</script>

</body>
</html>
