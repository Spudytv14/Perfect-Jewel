<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfect Jewel - Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }

    .stat-card {
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .stat-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 25px 40px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body class="h-full bg-gradient-to-br from-gray-100 to-gray-200">

<!-- Login -->
<div id="login-screen" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-purple-700 to-indigo-600">
  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
    <h1 class="text-4xl font-bold text-indigo-600 text-center mb-6">Perfect Jewel</h1>

    <input id="username" placeholder="Username" class="w-full mb-4 px-5 py-3 border rounded-2xl">
    <input id="password" type="password" placeholder="Password" class="w-full mb-4 px-5 py-3 border rounded-2xl">

    <button onclick="login()" class="w-full py-3 bg-indigo-600 text-white rounded-2xl">Login</button>
  </div>
</div>

<!-- App -->
<div id="main-app" class="hidden flex h-screen">

  <!-- Sidebar -->
  <div class="w-64 bg-white border-r hidden md:flex flex-col">
    <div class="p-6 border-b text-2xl font-bold text-indigo-600">Perfect Jewel</div>

    <div class="p-4 space-y-2">
      <button onclick="showPage('dashboard')" class="w-full text-left p-3 rounded-xl hover:bg-gray-100">Dashboard</button>
      <button onclick="showPage('products')" class="w-full text-left p-3 rounded-xl hover:bg-gray-100">Products</button>
      <button onclick="showPage('cash')" class="w-full text-left p-3 rounded-xl hover:bg-gray-100">Cash</button>
    </div>
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col">

    <!-- Top -->
    <div class="bg-white border-b px-6 py-4 flex justify-between items-center">
      <h2 id="page-title" class="text-xl font-semibold">Dashboard</h2>

      <div class="flex items-center gap-3">
        <div id="cash-top" class="font-bold text-emerald-600"></div>

        <button onclick="showInvestedAmount()" class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-4 py-2 rounded-xl">
          Invested
        </button>

        <button onclick="adjustCash()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl">
          + Cash
        </button>
      </div>
    </div>

    <!-- Pages -->
    <div class="p-6 overflow-auto">

      <!-- Dashboard -->
      <div id="dashboard-page">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">

          <div class="stat-card p-5 rounded-2xl">
            <p class="text-gray-500">Cash</p>
            <p id="cash-balance" class="text-2xl font-bold text-emerald-600"></p>
          </div>

          <div class="stat-card p-5 rounded-2xl">
            <p class="text-gray-500">Products</p>
            <p id="total-products" class="text-2xl font-bold"></p>
          </div>

          <div class="stat-card p-5 rounded-2xl">
            <p class="text-gray-500">Inventory</p>
            <p id="inventory-value" class="text-2xl font-bold"></p>
          </div>

          <div class="stat-card p-5 rounded-2xl">
            <p class="text-gray-500">Profit</p>
            <p id="profit-potential" class="text-2xl font-bold text-emerald-600"></p>
          </div>

        </div>

        <!-- Only ROI Chart remains -->
        <div class="p-6 rounded-2xl shadow-lg bg-white/70 backdrop-blur">
          <h3 class="mb-4 font-semibold">ROI Distribution</h3>
          <canvas id="roiChart"></canvas>
        </div>
      </div>

      <!-- Products -->
      <div id="products-page" class="hidden">

        <div class="flex gap-3 mb-4">
          <input id="search" placeholder="Search..." onkeyup="filterProducts()" class="flex-1 px-4 py-2 border rounded-xl">
          <button onclick="showAddProductModal()" class="bg-indigo-600 text-white px-4 rounded-xl">Add</button>
        </div>

        <table class="w-full bg-white rounded-xl overflow-hidden">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-3 text-left">Name</th>
              <th class="p-3">Cost</th>
              <th class="p-3">Sell</th>
              <th class="p-3">Stock</th>
              <th class="p-3">ROI</th>
              <th class="p-3">Action</th>
            </tr>
          </thead>
          <tbody id="products-table"></tbody>
        </table>
      </div>

      <!-- Cash -->
      <div id="cash-page" class="hidden">
        <div id="cash-log" class="space-y-3"></div>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
<div id="product-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
  <div class="bg-white p-6 rounded-2xl w-80">

    <form id="product-form" class="space-y-3">
      <input id="name" placeholder="Name" required class="w-full p-2 border rounded">
      <input id="cost" type="number" placeholder="Cost" required class="w-full p-2 border rounded">
      <input id="selling" type="number" placeholder="Selling" required class="w-full p-2 border rounded">
      <input id="stock" type="number" placeholder="Stock" class="w-full p-2 border rounded">

      <button class="w-full bg-indigo-600 text-white p-2 rounded">Save</button>
    </form>

  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];
let cashBalance = parseFloat(localStorage.getItem('cashBalance')) || 0;
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

function login() {
  if (username.value === "feluna" && password.value === "1234") {
    login-screen.classList.add('hidden');
    main-app.classList.remove('hidden');
    renderDashboard();
  }
}

function showInvestedAmount() {
  const invested = products.reduce((sum, p) => sum + (p.cost * p.stock), 0);
  alert("Total Invested: $" + invested.toFixed(2));
}

function renderDashboard() {
  cash-balance.textContent = "$" + cashBalance.toFixed(2);
  cash-top.textContent = "$" + cashBalance.toFixed(2);
  total-products.textContent = products.length;

  let total = products.reduce((s,p)=>s+p.cost*p.stock,0);
  let profit = products.reduce((s,p)=>s+(p.selling-p.cost)*p.stock,0);

  inventory-value.textContent = "$"+total.toFixed(2);
  profit-potential.textContent = "$"+profit.toFixed(2);

  renderProducts();
  updateChart();
}

function updateChart() {
  const ctx = document.getElementById('roiChart');
  new Chart(ctx, {
    type:'pie',
    data:{
      labels: products.map(p=>p.name),
      datasets:[{
        data: products.map(p=>((p.selling-p.cost)/p.cost*100)||0),
        backgroundColor:['#6366f1','#a855f7','#f43f5e','#10b981','#f59e0b']
      }]
    }
  });
}

function showPage(p){
  document.querySelectorAll('[id$="-page"]').forEach(x=>x.classList.add('hidden'));
  document.getElementById(p+'-page').classList.remove('hidden');
}

function renderProducts(list=products){
  products-table.innerHTML = list.map(p=>`
    <tr>
      <td class="p-2">${p.name}</td>
      <td class="p-2">$${p.cost}</td>
      <td class="p-2">$${p.selling}</td>
      <td class="p-2">${p.stock}</td>
      <td class="p-2">${((p.selling-p.cost)/p.cost*100).toFixed(1)}%</td>
      <td class="p-2"><button onclick="deleteProduct('${p.id}')">❌</button></td>
    </tr>
  `).join('');
}

function deleteProduct(id){
  products = products.filter(p=>p.id!==id);
  localStorage.setItem('products',JSON.stringify(products));
  renderDashboard();
}

function filterProducts(){
  let t = search.value.toLowerCase();
  renderProducts(products.filter(p=>p.name.toLowerCase().includes(t)));
}

function showAddProductModal(){
  product-modal.classList.remove('hidden');
}

product-form.onsubmit = e=>{
  e.preventDefault();
  products.push({
    id:Date.now(),
    name:name.value,
    cost:+cost.value,
    selling:+selling.value,
    stock:+stock.value
  });
  localStorage.setItem('products',JSON.stringify(products));
  product-modal.classList.add('hidden');
  renderDashboard();
}

function adjustCash(){
  let a = parseFloat(prompt("Amount:"));
  if(!isNaN(a)){
    cashBalance+=a;
    localStorage.setItem('cashBalance',cashBalance);
    renderDashboard();
  }
}
</script>

</body>
</html>
